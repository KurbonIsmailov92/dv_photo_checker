<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DV Photo Checker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: "Segoe UI", system-ui, sans-serif; }
    .drop-zone { transition: all 0.3s ease; }
    .drop-zone.dragover { background-color: #eff6ff; border-color: #2563eb; }
  </style>
</head>
<body class="min-h-screen bg-gray-50">
  <div class="mx-auto max-w-4xl p-6">
    <div class="mb-8 text-center">
      <h1 class="mb-2 text-4xl font-bold text-gray-800">DV Photo Checker</h1>
      <p class="text-gray-600">Validate and auto-fix photos for the Diversity Visa lottery.</p>
    </div>

    <div class="rounded-2xl bg-white p-8 shadow-xl">
      <div
        id="dropZone"
        class="drop-zone cursor-pointer rounded-xl border-2 border-dashed border-gray-300 p-12 text-center hover:border-blue-500"
      >
        <input type="file" id="fileInput" accept="image/*" class="hidden">
        <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-full bg-blue-100 text-2xl">
          IMG
        </div>
        <p class="text-lg font-medium text-gray-700">Drop a photo here or click to upload</p>
        <p class="mt-1 text-sm text-gray-500">JPG or PNG, up to 10 MB</p>
      </div>

      <div class="mt-6 flex justify-center gap-4">
        <button
          onclick="validatePhoto()"
          id="validateBtn"
          class="rounded-xl bg-blue-600 px-8 py-3 font-semibold text-white transition hover:bg-blue-700"
        >
          Validate Photo
        </button>
        <button
          onclick="autoFixPhoto()"
          id="fixBtn"
          class="rounded-xl bg-emerald-600 px-8 py-3 font-semibold text-white transition hover:bg-emerald-700"
        >
          Auto-Fix
        </button>
      </div>

      <div id="result" class="mt-8 hidden rounded-xl border bg-gray-50 p-6">
        <div id="resultContent"></div>
      </div>
    </div>

    <div class="mt-8 text-center text-sm text-gray-500">
      DV Photo Checker
    </div>
  </div>

  <script>
    let currentImageBase64 = "";

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");

    dropZone.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", (event) => handleFile(event.target.files[0]));

    dropZone.addEventListener("dragover", (event) => {
      event.preventDefault();
      dropZone.classList.add("dragover");
    });

    dropZone.addEventListener("dragleave", () => {
      dropZone.classList.remove("dragover");
    });

    dropZone.addEventListener("drop", (event) => {
      event.preventDefault();
      dropZone.classList.remove("dragover");
      handleFile(event.dataTransfer.files[0]);
    });

    function renderPreview(imageSrc, label) {
      dropZone.innerHTML = `
        <img src="${imageSrc}" class="mx-auto max-h-96 rounded-xl shadow-md">
        <p class="mt-4 text-sm font-medium text-green-600">${label}</p>
      `;
    }

    function handleFile(file) {
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function(event) {
        currentImageBase64 = event.target.result;
        renderPreview(currentImageBase64, "Photo uploaded");
      };
      reader.readAsDataURL(file);
    }

    async function validatePhoto() {
      if (!currentImageBase64) {
        alert("Upload a photo first.");
        return;
      }

      await sendRequest("/validate", currentImageBase64);
    }

    async function autoFixPhoto() {
      if (!currentImageBase64) {
        alert("Upload a photo first.");
        return;
      }

      await sendRequest("/auto-fix", currentImageBase64);
    }

    async function sendRequest(endpoint, imageBase64) {
      const btn = endpoint === "/validate"
        ? document.getElementById("validateBtn")
        : document.getElementById("fixBtn");
      const originalText = btn.textContent;

      btn.disabled = true;
      btn.textContent = "Processing...";

      try {
        const response = await fetch(endpoint, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ image: imageBase64, mode: "balanced" })
        });

        const contentType = response.headers.get("content-type") || "";
        if (endpoint === "/auto-fix" && contentType.startsWith("image/")) {
          const fixedBlob = await response.blob();
          const fixedUrl = URL.createObjectURL(fixedBlob);
          const reader = new FileReader();

          reader.onload = function(event) {
            currentImageBase64 = event.target.result;
          };
          reader.readAsDataURL(fixedBlob);

          renderPreview(fixedUrl, "Auto-fix applied");
          showResult({
            status: "AUTO-FIXED",
            warnings: ["The image was cropped and exported as a 600x600 JPEG."],
            issues: []
          });
          return;
        }

        const data = await response.json();
        showResult(data);
      } catch (error) {
        showResult({
          status: "ERROR",
          issues: ["Could not connect to the server."]
        });
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    function showResult(data) {
      const resultDiv = document.getElementById("result");
      const content = document.getElementById("resultContent");

      let html = '<h3 class="mb-4 text-xl font-bold">Result</h3>';

      if (data.score !== undefined) {
        const color = data.score >= 80
          ? "text-green-600"
          : data.score >= 60
            ? "text-yellow-600"
            : "text-red-600";
        html += `<p class="text-5xl font-bold ${color}">${data.score}</p>`;
      }

      if (data.status || data.decision_reason) {
        html += `<p class="mt-2 text-lg font-semibold">${data.status || data.decision_reason}</p>`;
      }

      if (data.issues && data.issues.length > 0) {
        html += '<div class="mt-4"><strong class="text-red-600">Issues:</strong><ul class="mt-2 list-disc pl-5">';
        data.issues.forEach((issue) => {
          html += `<li>${issue}</li>`;
        });
        html += "</ul></div>";
      }

      if (data.warnings && data.warnings.length > 0) {
        html += '<div class="mt-4"><strong class="text-amber-600">Warnings:</strong><ul class="mt-2 list-disc pl-5">';
        data.warnings.forEach((warning) => {
          html += `<li>${warning}</li>`;
        });
        html += "</ul></div>";
      }

      content.innerHTML = html;
      resultDiv.classList.remove("hidden");
    }
  </script>
</body>
</html>
